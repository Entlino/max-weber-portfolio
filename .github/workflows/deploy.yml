name: Test and Deploy

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: claude-app-2026
  GCP_REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/claude-app-2026/portfolio
  BACKEND_SERVICE: portfolio-backend
  FRONTEND_SERVICE: portfolio-frontend

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Restore
        run: dotnet restore backend/PortfolioApi.sln
      - name: Build
        run: dotnet build backend/PortfolioApi.sln --no-restore
      - name: Test
        run: dotnet test backend/PortfolioApi.sln --no-build --verbosity normal

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --prefix frontend
      - name: Unit tests
        run: npm run --prefix frontend test:run

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and push backend
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} ./backend
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}

      - name: Deploy backend
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image=${{ env.REGISTRY }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --port=8080 \
            --set-env-vars="ASPNETCORE_ENVIRONMENT=Production,AllowedOrigins__0=${{ secrets.FRONTEND_URL }}"

      - name: Build and push frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.BACKEND_URL }} \
            -t ${{ env.REGISTRY }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            ./frontend
          docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}

      - name: Deploy frontend
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image=${{ env.REGISTRY }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --port=8080

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests against live URL
        run: PLAYWRIGHT_BASE_URL=${{ secrets.FRONTEND_URL }} npx playwright test --config=e2e/playwright.config.ts
        working-directory: frontend
